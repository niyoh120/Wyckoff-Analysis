                      cards.append(current)
                      current = [line]
                  else:
                      current = candidate
              if current:
                  cards.append(current)
              total = len(cards)
              return [
                  [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'{title} {idx}/{total}\n' + '\n'.join(batch)}}]
