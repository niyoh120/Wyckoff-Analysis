name: Backtest Grid

on:
  workflow_dispatch:
    inputs:
      period:
        description: "еӣһжөӢж—¶жңҹпјҲдјҳе…ҲпјӣйҖү custom ж—¶з”Ё start/endпјү"
        required: true
        type: choice
        options:
          - "all_defined"
          - "recent_2m"
          - "recent_6m"
          - "bull_2020"
          - "bear_2022"
          - "custom"
        default: "all_defined"
      start:
        description: "иҮӘе®ҡд№үиө·е§Ӣж—Ҙжңҹ (YYYY-MM-DD)пјҢд»… period=custom ж—¶з”ҹж•Ҳ"
        required: false
        default: ""
      end:
        description: "иҮӘе®ҡд№үз»“жқҹж—Ҙжңҹ (YYYY-MM-DD)пјҢд»… period=custom ж—¶з”ҹж•Ҳ"
        required: false
        default: ""

concurrency:
  group: backtest-grid-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BT_START: ${{ inputs.start }}
  BT_END: ${{ inputs.end }}
  BT_TOP_N: "4"
  BT_BOARD: "all"
  BT_SAMPLE_SIZE: "0"
  BT_TRADING_DAYS: "320"
  BT_ENTRY_PRICE_MODE: "open"
  BT_INITIAL_CASH: "100000"
  BT_MAX_POSITIONS: "4"
  BT_PORTFOLIO_STYLES: "all_core"
  BT_COMMISSION_RATE: "0.0002"
  BT_SMALL_TRADE_THRESHOLD: "10000"
  BT_SMALL_TRADE_FEE: "5"

jobs:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Phase 1: еҚ• job жӢүеҸ–е…ЁйҮҸж•°жҚ®пјҢеҜјеҮәеҝ«з…§ artifact
  # и§ЈеҶі tushare IP йҷҗеҲ¶пјҲжңҖеӨҡ2дёӘпјүе’Ңйў‘зҺҮйҷҗеҲ¶пјҲ500ж¬Ў/еҲҶй’ҹпјү
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  fetch:
    name: Fetch snapshot (${{ matrix.period_key }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        period_key: [recent_2m, recent_6m, bull_2020, bear_2022]
    env:
      PYTHONUNBUFFERED: "1"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TICKFLOW_BASE_URL: ${{ secrets.TICKFLOW_BASE_URL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TZ: Asia/Shanghai
      BACKTEST_SNAPSHOT_WORKERS: "6"
    steps:
      - name: Resolve period dates
        id: period
        run: |
          INPUT_PERIOD="${{ inputs.period || 'recent_6m' }}"
          MATRIX_PERIOD="${{ matrix.period_key }}"
          ACTIVE="false"
          if { [ "$INPUT_PERIOD" = "all_defined" ] && [ "$MATRIX_PERIOD" != "recent_2m" ]; } || [ "$INPUT_PERIOD" = "$MATRIX_PERIOD" ]; then
            ACTIVE="true"
          elif [ "$INPUT_PERIOD" = "custom" ] && [ "$MATRIX_PERIOD" = "recent_6m" ]; then
            ACTIVE="true"
          fi
          echo "BT_PERIOD_ACTIVE=${ACTIVE}" >> "$GITHUB_ENV"
          echo "active=${ACTIVE}" >> "$GITHUB_OUTPUT"
          if [ "$ACTIVE" != "true" ]; then
            echo "BT_PERIOD_KEY=${MATRIX_PERIOD}" >> "$GITHUB_ENV"
            echo "period_key=${MATRIX_PERIOD}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$INPUT_PERIOD" = "custom" ]; then
            PERIOD="custom"
          else
            PERIOD="$MATRIX_PERIOD"
          fi
          echo "BT_PERIOD_KEY=${PERIOD}" >> "$GITHUB_ENV"
          echo "period_key=${PERIOD}" >> "$GITHUB_OUTPUT"
          if [ "$PERIOD" = "recent_2m" ]; then
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-2 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            # recent_6m (default)
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: steps.period.outputs.active == 'true'

      - name: Set up Python
        if: steps.period.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.period.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch data snapshot
        if: steps.period.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/backtest_snapshot_fetch.py \
            --start "$BT_START" \
            --end "$BT_END" \
            --board "$BT_BOARD" \
            --sample-size "$BT_SAMPLE_SIZE" \
            --trading-days "$BT_TRADING_DAYS" \
            --output-dir snapshot_data

      - name: Upload snapshot
        if: steps.period.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backtest-snapshot-${{ steps.period.outputs.period_key }}
          path: snapshot_data/*
          retention-days: 3

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Phase 2: е№¶иЎҢ job иҜ»еҝ«з…§еҒҡеӣһжөӢпјҲж— йңҖзҪ‘з»ңжӢүеҸ–пјү
  # еҹәзЎҖз»ҙеәҰ: hold_days Г— stop_lossпјӣжҜҸдёӘ job еҶ…йғЁеҫӘзҺҜ TP=0/18пјҲз”ҹдә§еҜ№йҪҗй»ҳи®Өе…ій—ӯ trailingпјү
  # йўқеӨ–й“ҫи·Ҝ: еӣәе®ҡжҢҒжңү 5/10 дёӘдәӨжҳ“ж—ҘпјҢSL=0/TP=0/Trail=0пјҢз”ЁдәҺи§ӮеҜҹж— йЈҺжҺ§йҖҖеҮәеҹәеҮҶгҖӮ
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  grid:
    name: Grid ${{ matrix.period_key }} h${{ matrix.hold_days }} sl${{ matrix.stop_loss }}
    runs-on: ubuntu-latest
    needs: fetch
    strategy:
      fail-fast: false
      max-parallel: 24
      matrix:
        period_key: [recent_6m, bull_2020, bear_2022]
        hold_days: [10, 15]
        stop_loss: [-7, -8]
        trailing_stop: [0]
        take_profit_values: ["0 18"]
        include:
          - period_key: recent_2m
            hold_days: 5
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: recent_2m
            hold_days: 10
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: recent_2m
            hold_days: 10
            stop_loss: -7
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: recent_2m
            hold_days: 15
            stop_loss: -8
            trailing_stop: 0
            take_profit_values: "18"
          - period_key: recent_2m
            hold_days: 20
            stop_loss: -8
            trailing_stop: -5
            take_profit_values: "0"
          - period_key: recent_6m
            hold_days: 5
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: bull_2020
            hold_days: 5
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: bear_2022
            hold_days: 5
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: recent_6m
            hold_days: 10
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: bull_2020
            hold_days: 10
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
          - period_key: bear_2022
            hold_days: 10
            stop_loss: 0
            trailing_stop: 0
            take_profit_values: "0"
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TICKFLOW_BASE_URL: ${{ secrets.TICKFLOW_BASE_URL }}
      FUNNEL_AI_SELECTION_MODE: "tradeable_l4"
      FUNNEL_AI_TOTAL_CAP: "8"
      FUNNEL_AI_RISK_ON_TREND: "3"
      FUNNEL_AI_RISK_ON_ACCUM: "5"
      FUNNEL_AI_BEAR_REBOUND_TREND: "0"
      FUNNEL_AI_BEAR_REBOUND_ACCUM: "0"
      FUNNEL_AI_RISK_OFF_TREND: "0"
      FUNNEL_AI_RISK_OFF_ACCUM: "0"
      FUNNEL_AI_NEUTRAL_TREND: "2"
      FUNNEL_AI_NEUTRAL_ACCUM: "3"

    steps:
      - name: Resolve period dates
        id: period
        run: |
          INPUT_PERIOD="${{ inputs.period || 'recent_6m' }}"
          MATRIX_PERIOD="${{ matrix.period_key }}"
          ACTIVE="false"
          if { [ "$INPUT_PERIOD" = "all_defined" ] && [ "$MATRIX_PERIOD" != "recent_2m" ]; } || [ "$INPUT_PERIOD" = "$MATRIX_PERIOD" ]; then
            ACTIVE="true"
          elif [ "$INPUT_PERIOD" = "custom" ] && [ "$MATRIX_PERIOD" = "recent_6m" ]; then
            ACTIVE="true"
          fi
          echo "BT_PERIOD_ACTIVE=${ACTIVE}" >> "$GITHUB_ENV"
          echo "active=${ACTIVE}" >> "$GITHUB_OUTPUT"
          if [ "$ACTIVE" != "true" ]; then
            echo "BT_PERIOD_KEY=${MATRIX_PERIOD}" >> "$GITHUB_ENV"
            echo "period_key=${MATRIX_PERIOD}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$INPUT_PERIOD" = "custom" ]; then
            PERIOD="custom"
          else
            PERIOD="$MATRIX_PERIOD"
          fi
          echo "BT_PERIOD_KEY=${PERIOD}" >> "$GITHUB_ENV"
          echo "period_key=${PERIOD}" >> "$GITHUB_OUTPUT"
          if [ "$PERIOD" = "recent_2m" ]; then
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-2 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: steps.period.outputs.active == 'true'

      - name: Set up Python
        if: steps.period.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.period.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[wbt]"

      - name: Download snapshot
        if: steps.period.outputs.active == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backtest-snapshot-${{ steps.period.outputs.period_key }}
          path: snapshot_data/

      - name: Run grid backtest cell
        if: steps.period.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HOLD="${{ matrix.hold_days }}"
          STOP="${{ matrix.stop_loss }}"
          TRAIL="${{ matrix.trailing_stop }}"
          TP_VALUES="${{ matrix.take_profit_values }}"
          STOP_TAG="${STOP#-}"
          TRAIL_TAG="${TRAIL#-}"
          OUT_ROOT="analysis/backtest_grid_actions/${BT_PERIOD_KEY}/h${HOLD}_sl${STOP_TAG}_tr${TRAIL_TAG}"
          echo "OUT_ROOT=${OUT_ROOT}" >> "${GITHUB_ENV}"
          mkdir -p "${OUT_ROOT}"

          for TP in ${TP_VALUES}; do
            OUT_DIR="${OUT_ROOT}/backtest-grid-${BT_PERIOD_KEY}-h${HOLD}-sl${STOP_TAG}-tp${TP}-tr${TRAIL_TAG}"
            mkdir -p "${OUT_DIR}"
            echo "[grid] period=${BT_PERIOD_KEY} hold=${HOLD} stop=${STOP} tp=${TP} trail=${TRAIL}"
            # е®һзӣҳжјҸж–—дёҚеҒҡеӨ§зӣҳж°ҙжё©жҜ”дҫӢжҲӘж–ӯпјӣеӣһжөӢдҝқжҢҒеҗҢеҸЈеҫ„пјҢйҒҝе…ҚйўқеӨ–з ҚжҺүеҖҷйҖүгҖӮ
            python -u -m scripts.backtest_runner \
              --start "${BT_START}" \
              --end "${BT_END}" \
              --hold-days "${HOLD}" \
              --top-n "${BT_TOP_N}" \
              --board "${BT_BOARD}" \
              --sample-size "${BT_SAMPLE_SIZE}" \
              --trading-days "${BT_TRADING_DAYS}" \
              --use-current-meta \
              --abc-filter \
              --entry-price-mode "${BT_ENTRY_PRICE_MODE}" \
              --cash-portfolio \
              --initial-cash "${BT_INITIAL_CASH}" \
              --max-positions "${BT_MAX_POSITIONS}" \
              --portfolio-styles "${BT_PORTFOLIO_STYLES}" \
              --commission-rate "${BT_COMMISSION_RATE}" \
              --small-trade-threshold "${BT_SMALL_TRADE_THRESHOLD}" \
              --small-trade-fee "${BT_SMALL_TRADE_FEE}" \
              --exit-mode sltp \
              --stop-loss "${STOP}" \
              --take-profit "${TP}" \
              --sltp-priority stop_first \
              --pending-mode both \
              --pending-merge-order funnel_first \
              --trailing-stop "${TRAIL}" \
              --metrics-engine auto \
              --wbt-n-jobs 2 \
              --snapshot-dir snapshot_data \
              --output-dir "${OUT_DIR}" \
              | tee "${OUT_DIR}/run.log"
          done

      - name: Upload artifacts
        if: always() && steps.period.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backtest-grid-${{ steps.period.outputs.period_key }}-h${{ matrix.hold_days }}-sl${{ matrix.stop_loss }}-tr${{ matrix.trailing_stop }}-${{ github.run_number }}
          path: ${{ env.OUT_ROOT }}/**
          retention-days: 7
          if-no-files-found: warn

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Phase 3: жұҮжҖ» + йЈһд№ҰйҖҡзҹҘ
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  notify:
    runs-on: ubuntu-latest
    needs: grid
    if: always()
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Resolve period dates
        run: |
          PERIOD="${{ inputs.period || 'recent_6m' }}"
          if [ "$PERIOD" = "all_defined" ]; then
            echo "BT_PERIOD_LABEL=recent_6m,bull_2020,bear_2022" >> "$GITHUB_ENV"
            echo "BT_START=multi" >> "$GITHUB_ENV"
            echo "BT_END=multi" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "recent_2m" ]; then
            echo "BT_PERIOD_LABEL=recent_2m" >> "$GITHUB_ENV"
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-2 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_PERIOD_LABEL=bull_2020" >> "$GITHUB_ENV"
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_PERIOD_LABEL=bear_2022" >> "$GITHUB_ENV"
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            echo "BT_PERIOD_LABEL=custom" >> "$GITHUB_ENV"
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            echo "BT_PERIOD_LABEL=recent_6m" >> "$GITHUB_ENV"
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: backtest-grid-*

      - name: Install dependencies
        run: pip install requests

      - name: Update market backtest report
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/update_backtest_market_report.py \
            --artifacts-dir artifacts \
            --output docs/BACKTEST_MARKET_REPORT.md \
            --run-url "$RUN_URL" \
            --generated-at "$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S Asia/Shanghai')"

      - name: Upload market backtest report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-market-report-${{ github.run_number }}
          path: docs/BACKTEST_MARKET_REPORT.md
          retention-days: 30
          if-no-files-found: error

      - name: Aggregate and notify
        shell: bash
        env:
          BT_TOP_N: "4"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -u - <<'PYEOF'
          import csv, os, glob, json, re, requests
          from core.backtest_grid_ranking import rank_robust_params, robust_label as shared_robust_label, weak_period_guardrails

          webhook = os.environ.get('FEISHU_WEBHOOK_URL', '').strip()
          if not webhook:
              print('FEISHU_WEBHOOK_URL жңӘй…ҚзҪ®пјҢи·іиҝҮйҖҡзҹҘ')
              exit(0)

          # иҜҠж–ӯпјҡжү“еҚ° artifacts зӣ®еҪ•з»“жһ„
