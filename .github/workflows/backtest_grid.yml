                  for g in guards
                  if g.period_key in known
              ]
              return lines

          def card_payload(title, template, card_elements):
              return {
                  'msg_type': 'interactive',
                  'card': {
                      'header': {'title': {'tag': 'plain_text', 'content': title}, 'template': template},
                      'elements': card_elements,
                  },
              }

          def payload_size(payload):
              return len(json.dumps(payload, ensure_ascii=False).encode('utf-8'))

          def post_card(title, template, card_elements):
              payload = card_payload(title, template, card_elements)
              size = payload_size(payload)
              resp = requests.post(webhook, json=payload, timeout=15)
              body = resp.text[:500]
              ok = 200 <= resp.status_code < 300
              try:
                  body_json = resp.json()
                  ok = ok and int(body_json.get('code', 0)) == 0
              except Exception:
                  pass
              print(f'йЈһд№ҰйҖҡзҹҘ[{title}]: status={resp.status_code}, bytes={size}, ok={ok}, body={body}')
              return ok

          def ranking_line(idx, c, best, periods):
              is_best = c.get('period') == best.get('period') and c.get('style') == best.get('style') and c['hold'] == best['hold'] and c['sl'] == best['sl'] and c['tp'] == best.get('tp') and c['tr'] == best.get('tr')
              mark = 'рҹҸҶ ' if is_best else ''
              tp_s = f'TP{c["tp"]}%' if c['tp'] else 'ж— TP'
              tr_s = f'Trail-{c["tr"]}%' if c['tr'] else 'ж— Trail'
              combo = f'{style_label(c.get("style", ""), c.get("style_label", ""))} / {c["hold"]}еӨ© / {sl_label(c["sl"])} / {tp_s} / {tr_s}'
