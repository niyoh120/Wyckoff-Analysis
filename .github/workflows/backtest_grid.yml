          def fixed_hold_baseline_lines(valid_cells, period_keys):
              baseline = [
                  c for c in valid_cells
                  if c.get('hold') in {5, 10}
                  and int(c.get('sl') or 0) == 0
                  and int(c.get('tp') or 0) == 0
                  and int(c.get('tr') or 0) == 0
                  and rank_value(c) is not None
              ]
              if not baseline:
                  return []
              periods_for_baseline = period_keys or sorted(
                  {c.get('period', '') for c in baseline if c.get('period')},
                  key=period_sort_key,
              )
              lines = ['**еӣәе®ҡжҢҒжңүж—Ғи·ҜеҹәеҮҶпјҲж— SL/ж— TP/ж— Trailпјү**']
              for period in periods_for_baseline:
                  for hold in (5, 10):
                      subset = [c for c in baseline if c.get('period') == period and c.get('hold') == hold]
                      if not subset:
                          continue
                      best_cell = max(subset, key=rank_value)
                      lines.append(
                          f'- {period_label(period)} {hold}еӨ©: '
                          f'{style_label(best_cell.get("style", ""), best_cell.get("style_label", ""))}пјҢ'
                          f'зҺ°йҮ‘ж”¶зӣҠ {fmt(best_cell.get("cash_return"), "+.2f")}%пјҢ'
                          f'зҺ°йҮ‘еӣһж’Ө {fmt(best_cell.get("cash_mdd") if best_cell.get("cash_mdd") is not None else best_cell.get("mdd"), ".1f")}%пјҢ'
                          f'еӨҸжҷ® {fmt(best_cell.get("sharpe"), ".3f")}'
                      )
              return lines if len(lines) > 1 else []

          def robust_key(c):
              return (c.get('style', ''), c.get('hold'), c.get('sl'), c.get('tp'), c.get('tr'))

          def robust_representative(group):
              recent_2m = [c for c in group if c.get('period') == 'recent_2m']
              if recent_2m:
                  return max(recent_2m, key=rank_value)
              recent = [c for c in group if c.get('period') == 'recent_6m']
              return max(recent or group, key=rank_value)

          def robust_scores(cells_for_rank):
              return rank_robust_params(
                  cells_for_rank,
                  key_fn=robust_key,
                  period_fn=lambda c: c.get('period') or '-',
                  value_fn=rank_value,
                  representative_fn=robust_representative,
              )

