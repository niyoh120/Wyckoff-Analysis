                  tag = 'рҹҸҶ' if br > 0 else 'рҹ“Ң'
                  best_period = f'пјҲ{period_label(best.get("period", ""))}пјү' if len(periods) > 1 else ''
                  tp_str = f'TP{best["tp"]}%' if best['tp'] else 'ж— жӯўзӣҲ'
                  tr_str = f'з§»еҠЁжӯўзӣҲ-{best["tr"]}%' if best['tr'] else 'ж— з§»еҠЁжӯўзӣҲ'
                  best_label = robust_label(robust_ranked[0]) if robust_ranked else 'жңҖдјҳеҸӮж•°пјҲжҢүзҺ°йҮ‘ж”¶зӣҠпјү'
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'{tag} **{best_label}{best_period}**: {style_label(best.get("style", ""), best.get("style_label", ""))} / жҢҒжңү{best["hold"]}еӨ© / {sl_label(best["sl"])} / {tp_str} / {tr_str}'}})

                  cols = [
                      ('**зҺ°йҮ‘ж”¶зӣҠ**', f'{fmt(best.get("cash_return"), "+.2f")}%'),
                      ('**жңҖз»ҲзҺ°йҮ‘**', f'{fmt(best.get("cash_final"), ",.2f")}'),
                      ('**зҺ°йҮ‘жҲҗдәӨ**', f'{int(best.get("cash_trades") or 0)}з¬”'),
                      ('**еӨҸжҷ®**', f'{sharp_flag(best.get("sharpe"))} {fmt(best.get("sharpe"), ".3f")}'),
                      ('**зҺ°йҮ‘еӣһж’Ө**', f'{fmt(best.get("cash_mdd") if best.get("cash_mdd") is not None else best.get("mdd"), ".1f")}%'),
                      ('**ж ·жң¬**', f'{int(best.get("trades") or 0)}з¬”'),
                  ]
                  elements.append({'tag': 'column_set', 'flex_mode': 'stretch',
                      'background_style': 'grey', 'columns': [
                          {'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'{label}\n{val}'}}
                          ]} for label, val in cols
                      ]})

                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'**зӯ–з•ҘдҪ“жЈҖ**: {risk_comment(best)}  В·  жӯЈзҺ°йҮ‘ж”¶зӣҠз»„еҗҲ {pos_cnt} / йқһжӯЈзҺ°йҮ‘ж”¶зӣҠз»„еҗҲ {neg_cnt}'}})
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'**йҖҗз¬”иҫ…еҠ©жҢҮж Ү**: еӨҸжҷ® {sharp_flag(best.get("sharpe"))} {fmt(best.get("sharpe"), ".3f")}пјҢиғңзҺҮ {fmt(best.get("win"), ".1f")}%пјҢеқҮж”¶ {fmt(best.get("avg"), "+.2f")}%'}})
                  if robust_ranked:
                      rb = robust_ranked[0]
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                          'content': f'**и·Ёе‘ЁжңҹзЁіеҒҘжҖ§**: жӯЈж”¶зӣҠе‘Ёжңҹ {rb.positive_periods}/{len(rb.values)}пјҢжңҖе·®е‘Ёжңҹ {fmt(min(rb.values), "+.2f")}%пјҢзЁіеҒҘеҲҶ {fmt(rb.score, ".2f")}'}})
                      guardrails = period_guardrail_lines(valid, periods)
                      if guardrails:
                          elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                              'content': '**е‘ЁжңҹйЈҺжҺ§жҸҗзӨә**\n' + '\n'.join(guardrails)}})

                  best_trade_rows = read_cash_trades(best.get('cash_trades_path'))
                  if best_trade_rows:
                      best_trade_rows = sorted(
                          best_trade_rows,
                          key=lambda row: (str(row.get('entry_date') or ''), str(row.get('code') or '')),
                      )
                      trade_lines = [trade_line(idx, row) for idx, row in enumerate(best_trade_rows, 1)]
                      title = f'**жңҖдјҳз»„еҗҲе®Ңж•ҙдәӨжҳ“и®°еҪ•**пјҲ{len(best_trade_rows)}з¬” В· {style_label(best.get("style", ""), best.get("style_label", ""))}пјү'
                      trade_cards = split_text_cards(title, trade_lines, 'blue')
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                          'content': f'**дәӨжҳ“и®°еҪ•**: жңҖдјҳз»„еҗҲ {len(best_trade_rows)} з¬”пјҢе·ІжӢҶжҲҗ {len(trade_cards)} еј й«ҳеҜҶжҳҺз»ҶеҚЎеҸ‘йҖҒгҖӮ'}})

                  if len(periods) > 1:
                      elements.append({'tag': 'hr'})
                      lines = ['**еҗ„е‘ЁжңҹжңҖдјҳпјҲжҢүзҺ°йҮ‘ж”¶зӣҠпјү**']
                      for period in periods:
                          subset = [c for c in valid if c.get('period') == period and rank_value(c) is not None]
                          if not subset:
                              continue
                          b = max(subset, key=rank_value)
                          tp_s = f'TP{b["tp"]}%' if b['tp'] else 'ж— TP'
                          tr_s = f'Trail-{b["tr"]}%' if b['tr'] else 'ж— Trail'
                          lines.append(
                              f'- {period_label(period)}: {style_label(b.get("style", ""), b.get("style_label", ""))} / {b["hold"]}еӨ© / {sl_label(b["sl"])} / {tp_s} / {tr_s}пјҢ'
                              f'зҺ°йҮ‘ж”¶зӣҠ {fmt(b.get("cash_return"), "+.2f")}%пјҢеӨҸжҷ® {fmt(b.get("sharpe"), ".3f")}'
                          )
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(lines)}})

                  if len(styles) > 1:
                      elements.append({'tag': 'hr'})
                      lines = ['**еҗ„дәӨжҳ“йЈҺж јжңҖдјҳпјҲжҢүзҺ°йҮ‘ж”¶зӣҠпјү**']
                      for style in styles:
                          subset = [c for c in valid if c.get('style') == style and rank_value(c) is not None]
                          if not subset:
                              continue
                          b = max(subset, key=rank_value)
                          tp_s = f'TP{b["tp"]}%' if b['tp'] else 'ж— TP'
                          tr_s = f'Trail-{b["tr"]}%' if b['tr'] else 'ж— Trail'
                          lines.append(
                              f'- {style_label(style, b.get("style_label", ""))}: {period_label(b.get("period", ""))} / {b["hold"]}еӨ© / {sl_label(b["sl"])} / {tp_s} / {tr_s}пјҢ'
                              f'зҺ°йҮ‘ж”¶зӣҠ {fmt(b.get("cash_return"), "+.2f")}%'
                          )
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(lines)}})

                  baseline_lines = fixed_hold_baseline_lines(valid, periods)
                  if baseline_lines:
                      elements.append({'tag': 'hr'})
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(baseline_lines)}})

                  # еҸӮж•°жўҜйҳҹе®Ңж•ҙжҺ’еҗҚжӢҶжҲҗеҗҺз»ӯиҪ»йҮҸеҚЎзүҮпјҢйҒҝе…ҚйЈһд№Ұ 100KB еҚ•еҚЎдёҠйҷҗгҖӮ
                  elements.append({'tag': 'hr'})
                  ranking_cards = split_ranking_cards(ranked, best, periods, 'blue' if (rank_value(best) or 0) > 0 else 'orange')
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**еҸӮж•°жўҜйҳҹиЎЁ**: е…ұ {len(ranked)} з»„пјҢе·ІжӢҶеҲҶдёә {len(ranking_cards)} еј еҗҺз»ӯеҚЎзүҮеҸ‘йҖҒпјҢйҒҝе…ҚйЈһд№ҰеҚ•еҚЎ 100KB дёҠйҷҗгҖӮ'}})

                  # еӨҸжҷ®зҹ©йҳөпјҲжҜҸж јеҸ– TP/Trail жңҖдјҳпјү
                  holds = sorted(set(c['hold'] for c in cells))
                  sls = sorted(set(c['sl'] for c in cells))
                  agg = {}
                  for c in cells:
                      key = (c['hold'], c['sl'])
                      if c.get('sharpe') is not None:
                          if key not in agg or c['sharpe'] > agg[key]['sharpe']:
                              agg[key] = c

                  if len(holds) > 1 and len(sls) > 1:
                      elements.append({'tag': 'hr'})
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                          'content': '**жңҖдјҳеӨҸжҷ®зҹ©йҳө** (жҜҸж јеҸ– TP/Trail жңҖдјҳ)'}})
                      # Header row
                      hdr_cols = [{'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                          {'tag': 'div', 'text': {'tag': 'lark_md', 'content': '**жҢҒжңү\\\\SL**'}}]}]
                      for s in sls:
                          hdr_cols.append({'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**{sl_axis_label(s)}**'}}]})
                      elements.append({'tag': 'column_set', 'flex_mode': 'stretch',
                          'background_style': 'grey', 'columns': hdr_cols})
                      # Data rows
                      for h in holds:
                          row_cols = [{'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**{h}еӨ©**'}}]}]
                          for s in sls:
                              c = agg.get((h, s))
                              v = fmt(c.get('sharpe') if c else None, '.3f')
                              is_b = c and c.get('period') == best.get('period') and c.get('style') == best.get('style') and c.get('hold') == best.get('hold') and c.get('sl') == best.get('sl') and c.get('tp') == best.get('tp') and c.get('tr') == best.get('tr')
                              cell_text = f'**{v}** рҹҸҶ' if is_b and v != '-' else v
                              row_cols.append({'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                                  {'tag': 'div', 'text': {'tag': 'lark_md', 'content': cell_text}}]})
                          elements.append({'tag': 'column_set', 'flex_mode': 'stretch', 'columns': row_cols})

          template = 'blue' if (best and (rank_value(best) or 0) > 0) else 'orange' if cells else 'red'
          ok = post_card('рҹ“Ҡ Backtest Grid еӣһжөӢе®ҢжҲҗ', template, elements)
          for idx, card_elements in enumerate(trade_cards, 1):
              ok = post_card(f'рҹ“Ҡ Backtest Grid жңҖдјҳдәӨжҳ“и®°еҪ• {idx}/{len(trade_cards)}', 'blue', card_elements) and ok
          for idx, card_elements in enumerate(ranking_cards, 1):
              ok = post_card(f'рҹ“Ҡ Backtest Grid еҸӮж•°жўҜйҳҹ {idx}/{len(ranking_cards)}', 'blue', card_elements) and ok
          if not ok:
              raise SystemExit(1)
          PYEOF

      - name: Notify on failure
        if: failure()
        run: |
          export RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          python3 - <<'PYEOF'
          import os, urllib.request, json
          url = os.environ.get('FEISHU_WEBHOOK_URL', '')
          if not url:
              print('FEISHU_WEBHOOK_URL жңӘй…ҚзҪ®пјҢи·іиҝҮеӨұиҙҘйҖҡзҹҘ')
              exit(0)
          run_url = os.environ.get('RUN_URL', '')
          content = '**Backtest Grid еӣһжөӢеӨұиҙҘ**\n**Run**: ' + run_url
          payload = {
              'msg_type': 'interactive',
              'card': {
                  'header': {'title': {'tag': 'plain_text', 'content': 'вқҢ Backtest Grid еӨұиҙҘ'}, 'template': 'red'},
                  'elements': [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': content}}],
              },
          }
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
          try:
              urllib.request.urlopen(req, timeout=15)
          except Exception as e:
              print(f'йҖҡзҹҘеӨұиҙҘ: {e}')
          PYEOF
