              if v >= 0:
                  return 'рҹҹ '
              return 'рҹ”ҙ'

          def risk_comment(c):
              if not c:
                  return 'ж— жңүж•Ҳж ·жң¬'
              cash_ret = c.get('cash_return')
              s = c.get('sharpe')
              avg = c.get('avg')
              mdd = c.get('cash_mdd') if c.get('cash_mdd') is not None else c.get('mdd')
              notes = []
              if cash_ret is not None and cash_ret < 0:
                  notes.append('зҺ°йҮ‘иҙҰжҲ·дәҸжҚҹ')
              elif cash_ret is not None and cash_ret < 5:
                  notes.append('зҺ°йҮ‘ж”¶зӣҠеҒҸејұ')
              elif cash_ret is not None:
                  notes.append('зҺ°йҮ‘ж”¶зӣҠдёәжӯЈ')
              elif s is not None and s < 0:
