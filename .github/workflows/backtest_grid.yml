          def find_cash_trades_path(summary_path, style):
              base_dir = os.path.dirname(summary_path)
              matches = sorted(glob.glob(os.path.join(base_dir, f'cash_trades_{style}_*.csv')))
              return matches[0] if matches else ''

          def read_cash_trades(path):
              if not path or not os.path.exists(path):
