              return f'{value:+.1f}%' if value is not None else '-'

          def trade_line(idx, row):
              entry_date = str(row.get('entry_date') or row.get('signal_date') or '')[5:]
              exit_date = str(row.get('exit_date') or '')[5:]
              code = str(row.get('code') or '-')
              name = str(row.get('name') or '')[:6]
              trigger = str(row.get('trigger') or '-').replace('гҖҒ', '+')
              reason = str(row.get('exit_reason') or '-')
              shares = parse_num(row.get('shares')) or 0
              return (
                  f'{idx}. {entry_date}->{exit_date} {code} {name} '
                  f'{fmt_trade_pct(row.get("ret_pct"))} {fmt_trade_price(row.get("entry_price"))}'
                  f'вҶ’{fmt_trade_price(row.get("exit_price"))} {int(shares)}иӮЎ {trigger}/{reason}'
              )

          def split_text_cards(title, lines, template, max_bytes=85000):
              cards = []
