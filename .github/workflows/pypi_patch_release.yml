name: PyPI Patch Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-patch-release
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build patch release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine
      - name: Validate package source
        run: |
          ruff check .
          ruff format --check .
          python scripts/quality_gate.py --ci
          python -m pytest tests/ -q
      - name: Select next patch version
        id: version
        run: |
          version="$(python scripts/prepare_patch_release.py)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building PyPI patch release $version"
      - name: Build and inspect distributions
        run: |
          rm -rf build dist *.egg-info
          python -m build
          python -m twine check dist/*
          python -m pip install --no-deps --target /tmp/wyckoff-wheel dist/*.whl
          PYTHONPATH=/tmp/wyckoff-wheel python -c "import importlib.metadata as m; assert m.version('youngcan-wyckoff-analysis') == '${{ steps.version.outputs.version }}'"
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ steps.version.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish patch release to PyPI
    needs: build
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/youngcan-wyckoff-analysis/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.build.outputs.version }}
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
