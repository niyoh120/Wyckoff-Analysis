name: US Recommendation Performance

on:
  schedule:
    # 北京时间周二到周六 06:15，衔接美股收盘后的 US Funnel。
    - cron: '15 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: us-recommendation-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      WYCKOFF_WRITE_CONTEXT: "server_job"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      US_TRACKING_PERFORMANCE_MAX_DATES: "60"
      US_TRACKING_PERFORMANCE_KLINE_COUNT: "180"
      TICKFLOW_KLINE_BATCH_SIZE: "100"
      TICKFLOW_KLINE_BATCH_SLEEP: "2.1"
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Refresh US recommendation performance
        run: |
          set -o pipefail
          python -u scripts/us_recommendation_performance_job.py \
            --logs "${{ github.workspace }}/logs/us_recommendation_performance.log" \
            2>&1 | tee -a "${{ github.workspace }}/logs/us_recommendation_performance.console.log"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-recommendation-performance-logs-${{ github.run_number }}
          path: logs/us_recommendation_performance*.log
          retention-days: 7
          if-no-files-found: warn
