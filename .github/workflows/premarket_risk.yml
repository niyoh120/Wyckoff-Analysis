name: Premarket Risk

on:
  # 定时 schedule 已停用：GitHub Actions 免费额度下 schedule 触发实测常延迟 3~5 小时
  # （曾配置 UTC 00:20/北京 08:20，实际多在北京 11:36~13:35 才开始跑），完全错过开盘前窗口。
  # 现由 Codex Automation 在工作日北京时间 08:20 调用 workflow_dispatch；Actions 页面仍可手动补跑。
  # 此时 VIX 已随美股收盘稳定超过 1 小时以上，且给 09:30 开盘留出缓冲。
  workflow_dispatch:

concurrency:
  group: premarket-risk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
      WYCKOFF_WRITE_CONTEXT: "server_job"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      PREMARKET_VIX_POLL_INTERVAL_SECONDS: "300"
      PREMARKET_LLM_PROVIDER: ${{ vars.PREMARKET_LLM_PROVIDER || secrets.PREMARKET_LLM_PROVIDER || 'efficiency' }}
      PREMARKET_LLM_FALLBACK_PROVIDERS: ${{ vars.PREMARKET_LLM_FALLBACK_PROVIDERS || secrets.PREMARKET_LLM_FALLBACK_PROVIDERS || '' }}
      EFFICIENCY_API_KEY: ${{ secrets.EFFICIENCY_API_KEY }}
      EFFICIENCY_MODEL: ${{ vars.EFFICIENCY_MODEL || secrets.EFFICIENCY_MODEL }}
      EFFICIENCY_BASE_URL: ${{ vars.EFFICIENCY_BASE_URL || secrets.EFFICIENCY_BASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Run premarket risk job
        run: |
          set -o pipefail
          python -u scripts/premarket_risk_job.py --logs ${{ github.workspace }}/logs/premarket_risk.log \
            2>&1 | tee -a ${{ github.workspace }}/logs/premarket_risk.console.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: premarket-risk-logs-${{ github.run_number }}
          path: logs/premarket_risk*.log
          retention-days: 7
          if-no-files-found: warn
