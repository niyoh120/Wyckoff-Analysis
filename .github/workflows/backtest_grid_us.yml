name: Backtest Grid US

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: "每日选股 TopN"
        required: true
        default: "2"
      trading_days:
        description: "回看交易日数"
        required: true
        default: "320"

concurrency:
  group: backtest-grid-us-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BT_TOP_N: ${{ inputs.top_n || '2' }}
  BT_TRADING_DAYS: ${{ inputs.trading_days || '320' }}
  WYCKOFF_STRATEGY_API_MODE: "remote"
  WYCKOFF_STRATEGY_API_URL: ${{ secrets.WYCKOFF_STRATEGY_API_URL }}
  WYCKOFF_STRATEGY_API_KEY: ${{ secrets.WYCKOFF_STRATEGY_API_KEY }}
  WYCKOFF_STRATEGY_API_TIMEOUT: "3600"
  WYCKOFF_STRATEGY_API_POLL_TIMEOUT: "3600"

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        period:
          - key: bear_2022
            label: "熊市(2022加息周期)"
            start: "2022-01-03"
            end: "2022-10-12"
          - key: bull_2023
            label: "牛市(2023-24 AI驱动)"
            start: "2023-01-03"
            end: "2024-07-31"
    env:
      PYTHONUNBUFFERED: "1"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch US data snapshot
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/backtest_snapshot_fetch_us.py \
            --start "${{ matrix.period.start }}" \
            --end "${{ matrix.period.end }}" \
            --trading-days "$BT_TRADING_DAYS" \
            --output-dir "snapshot_data/${{ matrix.period.key }}"

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-snapshot-${{ matrix.period.key }}
          path: snapshot_data/${{ matrix.period.key }}/*
          retention-days: 3

  grid:
    runs-on: ubuntu-latest
    needs: fetch
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        period:
          - key: bear_2022
            label: "熊市(2022加息周期)"
            start: "2022-01-03"
            end: "2022-10-12"
          - key: bull_2023
            label: "牛市(2023-24 AI驱动)"
            start: "2023-01-03"
            end: "2024-07-31"
        strategy:
          - id: s1_open_2x3x
            name: "策略1"
            desc: "开盘买入，2x/3x各卖50%，未成交按现价"
            hold: 20
            stop: 0
            tp: 0
            entry: open_next_session
            pullback: 0
            targets: "[2.0, 3.0]"
            fallback: mark_to_market
          - id: s2_pullback30_2x3x
            name: "策略2"
            desc: "回撤30%买入，2x/3x各卖50%；满3日未成交按原价，不满3日按现价"
            hold: 3
            stop: 0
            tp: 0
            entry: pullback_from_signal
            pullback: 30
            targets: "[2.0, 3.0]"
            fallback: original_or_mark
          - id: s3_pullback10_12x15x
            name: "策略3"
            desc: "回撤10%买入，1.2x/1.5x各卖50%；满3日剩余按最后一日1.2x开盘价，不满3日按现价"
            hold: 3
            stop: 0
            tp: 0
            entry: pullback_from_signal
            pullback: 10
            targets: "[1.2, 1.5]"
            fallback: last_day_1_2x_open_or_mark
          - id: patch_a_open_12x15x
            name: "补充A"
            desc: "开盘买入，1.2x/1.5x各卖50%，未成交按3日后开盘价"
            hold: 3
            stop: 0
            tp: 0
            entry: open_next_session
            pullback: 0
            targets: "[1.2, 1.5]"
            fallback: open_after_3d
          - id: patch_b_pullback10_11x13x
            name: "补充B"
            desc: "回撤10%买入，1.1x/1.3x各卖50%，未成交按3日后开盘价"
            hold: 3
            stop: 0
            tp: 0
            entry: pullback_from_signal
            pullback: 10
            targets: "[1.1, 1.3]"
            fallback: open_after_3d
          - id: patch_c_pullback20_12x15x
            name: "补充C"
            desc: "回撤20%买入，1.2x/1.5x各卖50%，未成交按3日后开盘价"
            hold: 3
            stop: 0
            tp: 0
            entry: pullback_from_signal
            pullback: 20
            targets: "[1.2, 1.5]"
            fallback: open_after_3d
    env:
      PYTHONUNBUFFERED: "1"
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[wbt]"

      - name: Download snapshot
        uses: actions/download-artifact@v4
        with:
          name: backtest-us-snapshot-${{ matrix.period.key }}
          path: snapshot_data/

      - name: Run strategy backtest cell
        shell: bash
        env:
          BT_START: ${{ matrix.period.start }}
          BT_END: ${{ matrix.period.end }}
          PERIOD_KEY: ${{ matrix.period.key }}
          PERIOD_LABEL: ${{ matrix.period.label }}
          STRATEGY_ID: ${{ matrix.strategy.id }}
          STRATEGY_NAME: ${{ matrix.strategy.name }}
          STRATEGY_DESC: ${{ matrix.strategy.desc }}
          ENTRY_RULE: ${{ matrix.strategy.entry }}
          PULLBACK_PCT: ${{ matrix.strategy.pullback }}
          TARGET_MULTIPLIERS: ${{ matrix.strategy.targets }}
          FALLBACK_RULE: ${{ matrix.strategy.fallback }}
          HOLD: ${{ matrix.strategy.hold }}
          STOP: ${{ matrix.strategy.stop }}
          TP: ${{ matrix.strategy.tp }}
        run: |
          set -euo pipefail
          OUT_DIR="analysis/backtest_grid_us/${PERIOD_KEY}_${STRATEGY_ID}"
          echo "OUT_DIR=${OUT_DIR}" >> "${GITHUB_ENV}"
          mkdir -p "${OUT_DIR}"
          export OUT_DIR

          set -o pipefail
          python - <<'PY' | tee "${OUT_DIR}/run.log"
          import json
          import os
          from pathlib import Path

          from integrations.strategy_api_client import run_backtest_legacy

          execution_strategy = {
              "id": os.environ["STRATEGY_ID"],
              "name": os.environ["STRATEGY_NAME"],
              "description": os.environ["STRATEGY_DESC"],
              "entry_rule": os.environ["ENTRY_RULE"],
              "pullback_pct": float(os.environ["PULLBACK_PCT"]),
              "target_multipliers": json.loads(os.environ["TARGET_MULTIPLIERS"]),
              "target_weights": [0.5, 0.5],
              "fallback_rule": os.environ["FALLBACK_RULE"],
              "max_entry_wait_days": int(os.environ["HOLD"]),
              "max_exit_wait_days": int(os.environ["HOLD"]),
              "sell_after_buy_only": True,
              "target_scan_start": "after_entry",
              "same_day_pullback_exit_policy": "forbid",
          }
          take_profit = float(os.environ["TP"])
          summary = run_backtest_legacy(
              start=os.environ["BT_START"],
              end=os.environ["BT_END"],
              hold_days=int(os.environ["HOLD"]),
              top_n=int(os.environ["BT_TOP_N"]),
              board="us",
              stop_loss_pct=float(os.environ["STOP"]),
              take_profit_pct=(take_profit if take_profit > 0 else None),
              execution_strategy=execution_strategy,
          )
          summary.update(
              {
                  "period_key": os.environ["PERIOD_KEY"],
                  "period_label": os.environ["PERIOD_LABEL"],
                  "start": os.environ["BT_START"],
                  "end": os.environ["BT_END"],
                  "strategy_desc": os.environ["STRATEGY_DESC"],
              }
          )
          out_dir = Path(os.environ["OUT_DIR"])
          out_dir.mkdir(parents=True, exist_ok=True)
          (out_dir / "summary.json").write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-grid-${{ matrix.period.key }}-${{ matrix.strategy.id }}-${{ github.run_number }}
          path: ${{ env.OUT_DIR }}/*
          retention-days: 7
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: grid
    if: always()
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: backtest-us-grid-*

      - name: Install dependencies
        run: pip install requests

      - name: Build report and notify
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -u scripts/notify_us_backtest.py \
            --artifacts-dir artifacts \
            --output docs/BACKTEST_US_REPORT.md \
            --run-url "$RUN_URL" \
            --top-n "$BT_TOP_N"

      - name: Upload market backtest report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-report-${{ github.run_number }}
          path: docs/BACKTEST_US_REPORT.md
          retention-days: 30
          if-no-files-found: error

      - name: Commit US backtest report
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/BACKTEST_US_REPORT.md
          if git diff --cached --quiet; then
            echo "US backtest report unchanged"
          else
            git commit -m "docs: update US backtest report"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ.get("FEISHU_WEBHOOK_URL", "")
          if not url:
              print("FEISHU_WEBHOOK_URL 未配置，跳过失败通知")
              raise SystemExit(0)
          payload = {
              "msg_type": "interactive",
              "card": {
                  "header": {"title": {"tag": "plain_text", "content": "❌ US Backtest Grid 失败"}, "template": "red"},
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": "**US Backtest Grid 美股回测失败**\n**Run**: " + os.environ.get("RUN_URL", ""),
                          },
                      }
                  ],
              },
          }
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=15)
          PY
