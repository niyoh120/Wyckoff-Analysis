name: Strategy Reflection

on:
  schedule:
    # 北京时间周二到周六 00:10，等 signal_feedback 完成后再跑。
    - cron: "10 16 * * 1-5"
  workflow_dispatch:

concurrency:
  group: strategy-reflection-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      WYCKOFF_WRITE_CONTEXT: "server_job"
      WYCKOFF_STRATEGY_REFLECTION: ${{ vars.WYCKOFF_STRATEGY_REFLECTION || 'shadow' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SIGNAL_REGISTRY_HORIZON: "5"
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh strategy reflection
        run: python -u scripts/strategy_reflection_job.py
