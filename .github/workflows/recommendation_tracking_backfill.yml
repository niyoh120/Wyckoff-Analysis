name: Recommendation Tracking Backfill

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "回填预设"
        required: true
        default: "20260526-l4"
        type: choice
        options:
          - "20260526-l4"

concurrency:
  group: recommendation-tracking-backfill-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TICKFLOW_KLINE_RATE_LIMIT_PER_MIN: "110"
      BACKFILL_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare artifact dirs
        run: mkdir -p logs artifacts

      - name: Run recommendation tracking backfill
        run: |
          set -o pipefail
          python -u scripts/backfill_recommendation_tracking.py \
            --preset "${{ github.event.inputs.preset }}" \
            --artifacts-dir "${{ github.workspace }}/artifacts" \
            2>&1 | tee -a "${{ github.workspace }}/logs/recommendation_tracking_backfill.log"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-tracking-backfill-${{ github.event.inputs.preset }}-${{ github.run_number }}
          path: |
            logs/*.log
            artifacts/**
          retention-days: 30
          if-no-files-found: warn
