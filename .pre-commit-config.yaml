repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: quality-gate
        name: "Quality gate (function length)"
        entry: uv run python scripts/quality_gate.py --check-functions
        language: system
        pass_filenames: false
        always_run: true
